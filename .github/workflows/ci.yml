name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
    with:
      otp_versions: '["27", "28"]'
      elixir_versions: '["1.18", "1.19"]'

  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@main
    with:
      otp_version: '28'
      elixir_version: '1.19'
      lint_command: 'mix quality'

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19'

      - name: Install Mix dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run coverage gates
        run: mix coverage.check

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            cover/
            cov
